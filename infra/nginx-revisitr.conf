# ─── Revisitr — standalone host (revisitr.ru) ────────────────
# Goes into /etc/nginx/sites-available/revisitr.ru (symlinked to sites-enabled),
# or /etc/nginx/conf.d/revisitr.conf. This server is dedicated to revisitr,
# so paths are served at the root (no /revisitr prefix).

# WebSocket upgrade helper (http context)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ─── HTTP ────────────────────────────────────────────────────
# Serves traffic now. Once the TLS cert is installed, switch the
# location blocks to the 443 server below and turn this into a
# permanent redirect (see commented line).
server {
    listen 80;
    listen [::]:80;
    server_name revisitr.ru www.revisitr.ru;

    # After enabling TLS, replace everything below with:
    # return 301 https://revisitr.ru$request_uri;

    client_max_body_size 25m;

    # API → backend
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8090/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # File storage (MinIO) — /storage/{key} → MinIO bucket "revisitr"
    location ^~ /storage/ {
        proxy_pass http://127.0.0.1:9000/revisitr/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend SPA
    location / {
        proxy_pass http://127.0.0.1:3340/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

