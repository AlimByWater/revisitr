# ─── Revisitr — standalone host (revisitr.ru) ────────────────
# Goes into /etc/nginx/sites-available/revisitr.ru (symlinked to sites-enabled),
# or /etc/nginx/conf.d/revisitr.conf. This server is dedicated to revisitr,
# so paths are served at the root (no /revisitr prefix).

# WebSocket upgrade helper (http context)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ─── HTTP → HTTPS redirect ───────────────────────────────────
# Keeps the ACME http-01 challenge path on :80 so certbot can renew.
server {
    listen 80;
    listen [::]:80;
    server_name revisitr.ru www.revisitr.ru;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://revisitr.ru$request_uri;
    }
}

# ─── HTTPS ───────────────────────────────────────────────────
# Cert managed by certbot (Let's Encrypt). Renews via the certbot
# systemd timer; reload nginx in the deploy hook if needed.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name revisitr.ru www.revisitr.ru;

    ssl_certificate     /etc/letsencrypt/live/revisitr.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/revisitr.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 25m;

    # Redirect www → apex
    if ($host = www.revisitr.ru) {
        return 301 https://revisitr.ru$request_uri;
    }

    # API → backend
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8090/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # File storage (MinIO) — /storage/{key} → MinIO bucket "revisitr"
    location ^~ /storage/ {
        proxy_pass http://127.0.0.1:9000/revisitr/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend SPA
    location / {
        proxy_pass http://127.0.0.1:3340/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
