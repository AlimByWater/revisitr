# ─── Revisitr ────────────────────────────────────────

# Revisitr API — strip /revisitr prefix, forward to backend
location ^~ /revisitr/api/ {
    proxy_pass http://127.0.0.1:8090/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
}

# Revisitr file storage (MinIO) — /revisitr/storage/{key} → MinIO bucket
location ^~ /revisitr/storage/ {
    proxy_pass http://127.0.0.1:9000/revisitr/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Revisitr Frontend — strip /revisitr prefix, serve SPA
location = /revisitr {
    return 301 /revisitr/;
}

location ^~ /revisitr/ {
    proxy_pass http://127.0.0.1:3340/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
