services:
  dev-backend:
    image: ghcr.io/${GITHUB_REPO:-alimbywater/revisitr}/backend:${DEV_BACKEND_TAG:-dev}
    env_file: .env.dev
    ports:
      - "8091:8080"
    depends_on:
      dev-postgres:
        condition: service_healthy
      dev-redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - revisitr

  dev-bot:
    image: ghcr.io/${GITHUB_REPO:-alimbywater/revisitr}/bot:${DEV_BOT_TAG:-dev}
    env_file: .env.dev
    extra_hosts:
      - "api.telegram.org:${TELEGRAM_API_IP:-149.154.167.220}"
    depends_on:
      dev-postgres:
        condition: service_healthy
      dev-redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - revisitr

  dev-masterbot:
    image: ghcr.io/${GITHUB_REPO:-alimbywater/revisitr}/admin-bot:${DEV_ADMIN_BOT_TAG:-dev}
    env_file: .env.dev
    extra_hosts:
      - "api.telegram.org:${TELEGRAM_API_IP:-149.154.167.220}"
    depends_on:
      dev-postgres:
        condition: service_healthy
      dev-redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - revisitr

  dev-frontend:
    image: ghcr.io/${GITHUB_REPO:-alimbywater/revisitr}/frontend:${DEV_FRONTEND_TAG:-dev}
    ports:
      - "3341:80"
    restart: unless-stopped
    networks:
      - revisitr

  dev-postgres:
    image: postgres:16-alpine
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-revisitr_dev}
      POSTGRES_USER: ${POSTGRES_USER:-revisitr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-revisitr}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - revisitr

  dev-redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata_dev:/data
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - revisitr

volumes:
  pgdata_dev:
  redisdata_dev:

networks:
  revisitr:
    external: true
    name: infra_revisitr
