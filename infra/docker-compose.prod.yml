services:
  backend:
    image: ghcr.io/${GITHUB_REPO:-alimbywater/revisitr}/backend:${BACKEND_TAG:-latest}
    env_file: .env.prod
    ports:
      - "8090:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - revisitr

  bot:
    image: ghcr.io/${GITHUB_REPO:-alimbywater/revisitr}/bot:${BOT_TAG:-latest}
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - revisitr

  frontend:
    image: ghcr.io/${GITHUB_REPO:-alimbywater/revisitr}/frontend:${FRONTEND_TAG:-latest}
    ports:
      - "3340:80"
    restart: unless-stopped
    networks:
      - revisitr

  postgres:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-revisitr}
      POSTGRES_USER: ${POSTGRES_USER:-revisitr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-revisitr}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - revisitr

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - revisitr

  migrator:
    image: ghcr.io/${GITHUB_REPO:-alimbywater/revisitr}/backend:${BACKEND_TAG:-latest}
    env_file: .env.prod
    entrypoint: ["/usr/local/bin/goose"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - revisitr
    profiles:
      - migrate

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    restart: unless-stopped
    networks:
      - revisitr

volumes:
  pgdata:
  redisdata:
  miniodata:

networks:
  revisitr:
    driver: bridge
