api:
  dashboard: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
    network: revisitr

certificatesResolvers:
  letsencrypt:
    acme:
      email: admin@elysium.fm
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web
