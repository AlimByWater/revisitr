# ─── Dev Stand — dev.revisitr.ru ──────────────────────────────
# Goes into /etc/nginx/sites-available/dev.revisitr.ru (symlinked to sites-enabled).
# Do NOT include map $http_upgrade — already defined in revisitr.ru config (http context).

# ─── HTTP → HTTPS redirect ───────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name dev.revisitr.ru;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://dev.revisitr.ru$request_uri;
    }
}

# ─── HTTPS ───────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dev.revisitr.ru;

    ssl_certificate     /etc/letsencrypt/live/dev.revisitr.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.revisitr.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 25m;

    # API → dev backend (:8091)
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8091/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # File storage → shared MinIO, dev bucket "revisitr-dev"
    location ^~ /storage/ {
        proxy_pass http://127.0.0.1:9000/revisitr-dev/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend SPA → dev frontend (:3341)
    location / {
        proxy_pass http://127.0.0.1:3341/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
