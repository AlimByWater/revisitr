name: Frontend (dev)

on:
  push:
    branches: [dev]
    paths: ['frontend/**', '.github/workflows/frontend-dev.yml']

env:
  REGISTRY: ghcr.io

jobs:
  lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci && npm run lint

  build-deploy:
    runs-on: self-hosted
    needs: lint
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}/frontend' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          build-args: |
            VITE_API_URL=/api/v1
            VITE_MOCK_API=false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev
      - name: Deploy
        run: |
          cd /opt/revisitr/infra
          export DEV_FRONTEND_TAG=dev
          docker compose -f docker-compose.dev.yml pull dev-frontend
          docker compose -f docker-compose.dev.yml up -d --no-deps dev-frontend
