name: Admin Bot

on:
  push:
    branches: [main]
    paths: ['backend/**', '.github/workflows/admin-bot.yml']
  pull_request:
    paths: ['backend/**']

env:
  REGISTRY: ghcr.io

jobs:
  lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - name: Lint
        working-directory: backend
        run: go vet ./...

  test:
    runs-on: self-hosted
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - name: Test
        working-directory: backend
        run: go test -race ./...

  build-deploy:
    runs-on: self-hosted
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}/admin-bot' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile.admin-bot
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
      - name: Deploy
        run: |
          cd /opt/revisitr/infra
          export ADMIN_BOT_TAG=${{ github.sha }}
          docker compose -f docker-compose.prod.yml pull admin-bot
          docker compose -f docker-compose.prod.yml up -d --no-deps admin-bot
